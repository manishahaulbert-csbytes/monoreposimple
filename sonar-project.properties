sonar.projectKey=monoreposimple
sonar.projectName=monoreposimple
sonar.projectVersion=1.0

# Main Python files (excluding test directories)
sonar.sources=proj1/helloworld1.py,proj2/helloworld2.py

# Test files
sonar.tests=proj1/tests,proj2/tests

# Exclude test directories from main sources
sonar.exclusions=**/tests/**

# Coverage reports
sonar.python.coverage.reportPaths=coverage.xml

