      sonar.qualitygate.wait=true
      sonar.qualitygate.timeout=600
      sonar.verbose=true
      sonar.projectBaseDir=$(System.DefaultWorkingDirectory)
      sonar.sources=proj2
      sonar.exclusions=proj2/tests/**
      sonar.tests=proj2/tests
      sonar.python.xunit.reportPath=$(System.DefaultWorkingDirectory)/proj2-results.xml
      sonar.python.coverage.reportPaths=$(System.DefaultWorkingDirectory)/proj2-coverage.xml
      sonar.scanner.metaDataFilePath=$(Agent.TempDirectory)/sonar-proj2.properties

- script: |
    pip install -e ./proj2
    export PYTHONPATH="$(System.DefaultWorkingDirectory)"
    pytest proj2/tests \
      --junitxml=proj2-results.xml \
      --cov=proj2 \
      --cov-report=xml:proj2-coverage.xml
  displayName: 'Run Proj2 Tests'
  condition: eq(variables['DetermineChanges.runProj2'], 'true')
  continueOnError: false  # Set to false to ensure SonarQube runs even if tests fail

- task: SonarQubeAnalyze@8
  displayName: 'Run Sonar Analysis for Proj2'
  continueOnError: false
  condition: and(eq(variables['python.version'], '3.11'),
                eq(variables['DetermineChanges.runProj2'], 'true')) # Crucial: runs even if tests fail
  inputs:
    jdkversion: 'JAVA_HOME_17_X64'

- task: SonarQubePublish@8
  displayName: 'Publish Quality Gate Result for Proj2'
  condition: and(succeeded(),
                eq(variables['python.version'], '3.11'),
                eq(variables['DetermineChanges.runProj2'], 'true'))
  inputs:
    pollingTimeoutSec: '600'    
    reportTaskFile: '$(Agent.TempDirectory)/sonar-proj2.properties'

##################################################
# Proj3 block
##################################################
- task: SonarQubePrepare@8
  displayName: 'Prepare SonarQube for Proj3'
  condition: and(eq(variables['python.version'], '3.11'),
                eq(variables['DetermineChanges.runProj3'], 'true'))
