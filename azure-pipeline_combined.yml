                eq(variables['DetermineChanges.runProj3'], 'true'))
  inputs:
    pollingTimeoutSec: '600'
    reportTaskFile: '$(Agent.TempDirectory)/sonar-proj3.properties'

# 3. Publish test results for any project that ran
- task: PublishTestResults@2
  condition: succeededOrFailed()
  inputs:
    testResultsFiles: '*-results.xml'

